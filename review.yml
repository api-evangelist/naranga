    No WebSocket surface exists, and no documented public API of any kind
    exists for Naranga. The apis.yml entry is an honest stub: kind company,
    empty apis list, and common links limited to the verifiable Website and
    LinkedIn. No OpenAPI, plans, rate-limits, finops, or collections artifacts
    were fabricated because no sourced, developer-facing specification exists.
